<!DOCTYPE html>
<html lang="ca">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Escull el dia ❤️</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="background-hearts">

        <span>💚</span>
        <span>🤍</span>
        <span>💚</span>
        <span>🤍</span>
        <span>💚</span>
        <span>🤍</span>

    </div>

    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>

    <main class="card">

        <p class="subtitle">
            ❤️ Ja gairebé està ❤️
        </p>

        <h1>
            Quin dia et va millor?
        </h1>

        <p class="description">

            Escull un dia i una hora perquè puguem organitzar la nostra cita. 💚

        </p>

        <input id="dia" type="date" class="input">

        <br><br>

        <input id="hora" type="time" class="input">

        <br><br>

        <button id="continuar">

            Continuar ❤️

        </button>

    </main>

    <script type="module">

        import { db } from "./firebase.js";
        import { collection, addDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

        const boto = document.getElementById("continuar");

        boto.addEventListener("click", async () => {

            const restaurant = localStorage.getItem("restaurant");

            const dia = document.getElementById("dia").value;

            const hora = document.getElementById("hora").value;

            if (dia === "" || hora === "") {

                alert("Si us plau, escull un dia i una hora ❤️");

                return;

            }

            localStorage.setItem("dia", dia);

            localStorage.setItem("hora", hora);

            try {

                await addDoc(collection(db, "respostes"), {

                    restaurant: restaurant,
                    dia: dia,
                    hora: hora,
                    acceptada: true,
                    respostaEnviada: new Date()

                });

                window.location.href = "final.html";

            }

            catch (error) {

                console.error(error);

                alert("Hi ha hagut un error.");

            }

        });

    </script>

</body>

</html>
