<!DOCTYPE html>
<html lang="ca">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>La nostra cita ❤️</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="background-hearts">

        <span>💚</span>
        <span>🤍</span>
        <span>💚</span>
        <span>🤍</span>
        <span>💚</span>
        <span>🤍</span>
        <span>💚</span>
        <span>🤍</span>

    </div>

    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>

    <main class="card">

        <p class="subtitle">
            ❤️ Ja tenim el pla! ❤️
        </p>

        <h1>
            No puc esperar que arribi el dia 🥹
        </h1>

        <p class="description">
            Has escollit:
        </p>

        <h2 id="restaurantEscollit" style="margin-bottom:30px;color:#4CAF50;">
            ...
        </h2>

        <p class="description">
            Moltes gràcies per acceptar aquesta cita.
            <br><br>
            Tinc moltes ganes de passar aquest dia amb tu. 💚
        </p>

        <button id="calendarButton">
            📅 Afegir al calendari
        </button>

    </main>

    <script>

        // Mostrar el restaurant escollit
        const restaurant = localStorage.getItem("restaurant") || "Per confirmar";

        document.getElementById("restaurantEscollit").textContent = restaurant;

        // Botó del calendari
        document.getElementById("calendarButton").addEventListener("click", () => {

            // ===========================
            // CANVIA NOMÉS AQUESTES DADES
            // ===========================

            const data = "2026-07-25"; // Format: AAAA-MM-DD
            const hora = "20:00";      // Format: HH:MM

            // ===========================

            const inici = new Date(`${data}T${hora}:00`);

            // La cita durarà 1 hora
            const fi = new Date(inici.getTime() + 60 * 60 * 1000);

            function formatDate(date) {
                return date.toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";
            }

            const ics = `BEGIN:VCALENDAR
VERSION:2.0
BEGIN:VEVENT
SUMMARY:❤️ La nostra cita
DESCRIPTION:No puc esperar que arribi aquest dia ❤️
LOCATION:${restaurant}
DTSTART:${formatDate(inici)}
DTEND:${formatDate(fi)}
END:VEVENT
END:VCALENDAR`;

            const blob = new Blob([ics], { type: "text/calendar" });

            const url = URL.createObjectURL(blob);

            const a = document.createElement("a");

            a.href = url;
            a.download = "LaNostraCita.ics";

            document.body.appendChild(a);

            a.click();

            document.body.removeChild(a);

            URL.revokeObjectURL(url);

        });

    </script>

</body>

</html>
